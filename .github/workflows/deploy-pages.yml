name: Deploy a GitHub Pages

# Publica la app (release/web) en GitHub Pages tras pasar toda la verificación de
# calidad. Se dispara en cada push a la rama de distribución (main) y manualmente.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para publicar en Pages con el despliegue oficial.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez; no cancelar una en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Verificar y empaquetar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate (motor vs Excel)
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Package (release/)
        run: npm run package

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (release/web)
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/web

  deploy:
    name: Publicar en Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
